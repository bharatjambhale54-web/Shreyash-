<!DOCTYPE html>
<html>
<head>
  <title>Bhram - Horror Movie</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1505635552518-3448ff116af3') no-repeat center/cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      color: red;
      text-shadow: 0 0 20px red;
    }

    .btn {
      padding: 15px 30px;
      background: red;
      color: white;
      border: none;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }

    .section {
      padding: 50px 20px;
    }

    iframe {
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>भ्रम (BHRAM)</h1>
    <p>A Horror Experience</p>
    <button class="btn" onclick="document.getElementById('watch').scrollIntoView();">
      Watch Now
    </button>
  </div>

  <div class="section" id="watch">
    <h2>🎬 Watch Movie</h2>

    <!-- Replace YOUR_VIDEO_ID -->
    <iframe width="80%" height="450"
    src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
    allowfullscreen>
    </iframe>

  </div>

  <div class="section">
    <h2>📖 About</h2>
    <p>
      "Bhram" is a horror movie that explores fear, illusion, and reality.
      A group of friends experiences something they can’t explain...
    </p>
  </div>

  <div class="section">
    <h2>🎭 Credits</h2>
    <p>📸 Photography: Shreyash Jambhle</p>
    <p>📝 Script: Vinayak Atkari</p>
    <p>✂️ Editing: Sumit Navale</p>
  </div>

</body>
</html>
